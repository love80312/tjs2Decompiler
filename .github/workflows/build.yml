name: Build and Archive

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Rust toolchain (Supports Edition 2024)
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable

    - name: Build release binary
      env:
        RUSTFLAGS: "--cap-lints allow" # 關鍵修正：強制將所有代碼檢查限制降級為允許，無視未使用的程式碼警告
      run: cargo build --release

    - name: Archive production artifacts
      run: |
        powershell Compress-Archive -Path target\release\tjs2dec.exe -DestinationPath tjs2dec-windows.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: tjs2dec-windows-binary
        path: tjs2dec-windows.zip
