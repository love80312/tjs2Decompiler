name: Build and Archive

on:
  push:
    branches:
      - main
      - master # 這樣無論預設分支是 main 還是 master 都會觸發
  workflow_dispatch: # 這個可以讓你在 GitHub 網頁上隨時手動點擊執行

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Rust toolchain (Supports Edition 2024)
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable

    - name: Build release binary
      run: cargo build --release

    - name: Archive production artifacts
      run: |
        powershell Compress-Archive -Path target\release\tjs2dec.exe -DestinationPath tjs2dec-windows.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: tjs2dec-windows-binary
        path: tjs2dec-windows.zip
